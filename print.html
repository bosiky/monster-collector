<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Monster Collector - Print Cards</title>
  <style>
    /* ========== Reset & Base ========== */
    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body.bw-mode .print-page {
      filter: grayscale(1) contrast(1.1);
    }

    /* ========== Controls (hidden on print) ========== */
    .controls {
      text-align: center;
      padding: 24px 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      border-bottom: 2px solid rgba(245,158,11,0.3);
    }
    .controls h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.3);
    }
    .controls p {
      margin: 0 0 16px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .btn-color {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      border-color: #a78bfa;
    }
    .btn-color:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139,92,246,0.4); }
    .btn-bw {
      background: linear-gradient(135deg, #374151, #1f2937);
      color: white;
      border-color: #6b7280;
    }
    .btn-bw:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(107,114,128,0.4); }

    @media print {
      .controls { display: none !important; }
      body { background: white !important; }
    }

    /* ========== A4 Page ========== */
    @page {
      size: A4;
      margin: 0;
    }
    .print-page {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: 0 auto 24px;
      position: relative;
      page-break-after: always;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    @media print {
      .print-page {
        margin: 0;
        box-shadow: none;
      }
    }

    /* ========== STANDARD CARDS: 3x3 Grid (9 per page) ========== */
    .card-grid {
      width: calc(63.5mm * 3);
      height: calc(88.9mm * 3);
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 0;
    }
    .card-wrapper {
      width: 63.5mm;
      height: 88.9mm;
      padding: 0;
      margin: 0;
    }

    /* ========== LARGE CARDS (Stations): 2x2 Grid (4 per page) ========== */
    .card-grid-lg {
      /* Increased to ~95mm x 133mm each to fit nicely as 4 cards on A4 */
      width: calc(95mm * 2);
      height: calc(133mm * 2);
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 0;
    }
    .card-wrapper-lg {
      width: 95mm;
      height: 133mm;
      padding: 0;
      margin: 0;
    }
    /* Scale text up a bit for large cards */
    .card-wrapper-lg .card-header { padding: 6px 8px; font-size: 1rem; }
    .card-wrapper-lg .card-effect-text { font-size: 0.8rem; }
    .card-wrapper-lg .card-rarity { font-size: 0.8rem; top: 5px; right: 6px; }

    /* ========== Card Face Shared ========== */
    .card {
      width: 100%;
      height: 100%;
      background: #111;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 2.5px solid;
    }

    .card-header {
      padding: 4px 6px;
      font-size: 0.75rem;
      font-weight: bold;
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.8);
      z-index: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }

    .card-image-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      background: #222;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.12); /* Crop out baked-in white borders e.g. TNT */
    }

    .card-effect-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
      padding: 10px 6px 5px;
      text-align: center;
    }

    .card-effect-text {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.92);
      line-height: 1.35;
    }

    /* Rarity stars */
    .card-rarity {
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 0.5rem;
      z-index: 3;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* ========== Card Back: Premium Star Design ========== */
    .card-back-design {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #060620 0%, #0d0d35 30%, #15103a 50%, #0a0828 70%, #060620 100%);
      border: 2.5px solid #c9a84c;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Ornamental borders */
    .card-back-design::before {
      content: '';
      position: absolute;
      top: 2.5mm; bottom: 2.5mm; left: 2.5mm; right: 2.5mm;
      border: 1.5px solid rgba(201, 168, 76, 0.45);
      border-radius: 3px;
      z-index: 1;
    }
    .card-back-design::after {
      content: '';
      position: absolute;
      top: 4.5mm; bottom: 4.5mm; left: 4.5mm; right: 4.5mm;
      border: 0.5px solid rgba(201, 168, 76, 0.2);
      border-radius: 2px;
      z-index: 1;
    }

    /* Corner decorations */
    .corner-deco { position: absolute; width: 8mm; height: 8mm; z-index: 2; }
    .corner-deco::before, .corner-deco::after {
      content: '✦'; position: absolute; color: rgba(201, 168, 76, 0.5); font-size: 0.45rem;
    }
    .card-wrapper-lg .corner-deco::before, .card-wrapper-lg .corner-deco::after { font-size: 0.7rem; }
    .corner-tl { top: 5mm; left: 5mm; }
    .corner-tr { top: 5mm; right: 5mm; }
    .corner-bl { bottom: 5mm; left: 5mm; }
    .corner-br { bottom: 5mm; right: 5mm; }

    /* Central star glow */
    .star-glow {
      position: absolute; width: 30mm; height: 30mm; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.04) 40%, transparent 70%);
      z-index: 1;
    }
    .card-wrapper-lg .star-glow { width: 45mm; height: 45mm; }

    /* Central star cluster */
    .star-center { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .star-main {
      font-size: 2.8rem; line-height: 1; color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.25);
      filter: drop-shadow(0 0 3px rgba(255,215,0,0.8));
    }
    .card-wrapper-lg .star-main { font-size: 4rem; }
    .star-sub { font-size: 0.9rem; color: rgba(201, 168, 76, 0.7); letter-spacing: 3px; }
    .card-wrapper-lg .star-sub { font-size: 1.2rem; margin-top: 5px; }

    /* Mini stars */
    .mini-stars { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2; overflow: hidden; }
    .mini-star { position: absolute; color: rgba(201, 168, 76, 0.35); font-size: 0.35rem; }
    .card-wrapper-lg .mini-star { font-size: 0.5rem; }
    .ms1 { top: 12%; left: 18%; } .ms2 { top: 20%; right: 22%; font-size: 0.25rem; opacity: 0.6; }
    .ms3 { bottom: 22%; left: 15%; font-size: 0.28rem; } .ms4 { bottom: 15%; right: 18%; }
    .ms5 { top: 35%; left: 10%; font-size: 0.22rem; opacity: 0.5; } .ms6 { bottom: 35%; right: 10%; font-size: 0.22rem; opacity: 0.5; }
    .ms7 { top: 10%; left: 45%; font-size: 0.2rem; opacity: 0.4; } .ms8 { bottom: 10%; left: 42%; font-size: 0.2rem; opacity: 0.4; }

    /* Title at bottom */
    .back-title { position: absolute; bottom: 6mm; left: 0; right: 0; text-align: center; z-index: 3; }
    .back-title span { font-size: 0.35rem; letter-spacing: 2px; color: rgba(201, 168, 76, 0.35); text-transform: uppercase; }
    .card-wrapper-lg .back-title span { font-size: 0.5rem; }
  </style>
</head>
<body>

  <div class="controls">
    <h1>⭐ Monster Collector — Card Print</h1>
    <p>一般卡：一頁9張 (3x3) &nbsp; | &nbsp; 基地卡：放大版一頁4張 (2x2)<br>雙面列印時請選擇「短邊翻轉（若印橫向）或長邊翻轉（預設）」</p>
    <div class="btn-group">
      <button class="btn btn-color" onclick="printMode('color')">🎨 彩色列印</button>
      <button class="btn btn-bw" onclick="printMode('bw')">🖤 黑白列印</button>
    </div>
  </div>

  <div id="pages-container"></div>

  <script src="js/cards.js"></script>
  <script>
    function printMode(mode) {
      if (mode === 'bw') {
        document.body.classList.add('bw-mode');
      } else {
        document.body.classList.remove('bw-mode');
      }
      setTimeout(() => window.print(), 100);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById('pages-container');

      // Group 1: Standard Cards (Monsters, Skills) -> 9 per page
      const standardCards = [
        ...CARD_DATA.monsters.map(c => ({...c, cat: 'monster'})),
        ...CARD_DATA.skills.map(c => ({...c, cat: 'skill'}))
      ];

      // Group 2: Station Cards -> 2 copies each, 4 per page
      const stationCards = [];
      CARD_DATA.stations.forEach(c => {
        stationCards.push({...c, cat: 'station'});
        stationCards.push({...c, cat: 'station'});
      });

      let html = '';

      // ======== HELPER FUNCTION TO RENDER PAGES ========
      function renderBatch(deck, cols, rows, cssSizeClass) {
        let resultHTML = '';
        const cardsPerPage = cols * rows;
        for (let i = 0; i < deck.length; i += cardsPerPage) {
          let pageCards = deck.slice(i, i + cardsPerPage);
          while (pageCards.length < cardsPerPage) pageCards.push(null);

          // FRONT PAGE
          resultHTML += `<div class="print-page"><div class="${cssSizeClass}">`;
          pageCards.forEach(card => {
            if (!card) {
              resultHTML += `<div class="card-wrapper ${cssSizeClass === 'card-grid-lg' ? 'card-wrapper-lg' : ''}"></div>`;
              return;
            }

            let color = card.color || '#555';
            if (card.cat === 'station') color = '#10b981';

            let rarityHTML = card.rarity ? `<div class="card-rarity">${'⭐'.repeat(card.rarity)}</div>` : '';
            let effectHTML = (card.cat === 'skill' && card.description) ? 
              `<div class="card-effect-bar"><div class="card-effect-text">${card.description}</div></div>` : '';

            // Title prefix handling
            let titleText = card.name;
            if (card.cat === 'station' && !card.emoji) {
              titleText = `🏠 基地: ${card.name}`; 
            } else if (card.emoji) {
              titleText = `${card.emoji} ${card.name}`;
            }

            resultHTML += `
              <div class="card-wrapper ${cssSizeClass === 'card-grid-lg' ? 'card-wrapper-lg' : ''}">
                <div class="card" style="border-color: ${color}">
                  ${rarityHTML}
                  <div class="card-header">${titleText}</div>
                  <div class="card-image-wrap">
                    ${card.image ? `<img src="${card.image}" class="card-image" loading="lazy">` : ''}
                    ${effectHTML}
                  </div>
                </div>
              </div>`;
          });
          resultHTML += '</div></div>';

          // BACK PAGE (Mirrored for double-sided)
          const mirroredCards = [];
          for (let row = 0; row < rows; row++) {
            for (let col = cols - 1; col >= 0; col--) {
              mirroredCards.push(pageCards[row * cols + col]);
            }
          }

          resultHTML += `<div class="print-page"><div class="${cssSizeClass}">`;
          mirroredCards.forEach(card => {
            if (!card) {
              resultHTML += `<div class="card-wrapper ${cssSizeClass === 'card-grid-lg' ? 'card-wrapper-lg' : ''}"></div>`;
              return;
            }
            resultHTML += `
              <div class="card-wrapper ${cssSizeClass === 'card-grid-lg' ? 'card-wrapper-lg' : ''}">
                <div class="card-back-design">
                  <div class="mini-stars">
                    <span class="mini-star ms1">✦</span><span class="mini-star ms2">✧</span>
                    <span class="mini-star ms3">✦</span><span class="mini-star ms4">✧</span>
                    <span class="mini-star ms5">✦</span><span class="mini-star ms6">✧</span>
                    <span class="mini-star ms7">✦</span><span class="mini-star ms8">✧</span>
                  </div>
                  <div class="corner-deco corner-tl"></div><div class="corner-deco corner-tr"></div>
                  <div class="corner-deco corner-bl"></div><div class="corner-deco corner-br"></div>
                  <div class="star-glow"></div>
                  <div class="star-center">
                    <div class="star-main">★</div>
                    <div class="star-sub">✦ M ★ C ✦</div>
                  </div>
                  <div class="back-title"><span>Monster Collector</span></div>
                </div>
              </div>`;
          });
          resultHTML += '</div></div>';
        }
        return resultHTML;
      }

      // Render Standard Cards (3x3 Grid)
      html += renderBatch(standardCards, 3, 3, 'card-grid');

      // Render Large Station Cards (2x2 Grid)
      html += renderBatch(stationCards, 2, 2, 'card-grid-lg');

      container.innerHTML = html;
    });
  </script>
</body>
</html>
